name: Build and Package Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies (if any)
      run: |
        # Add any build steps here
        echo "No dependencies to install"
    
    - name: Validate manifest.json
      run: |
        if [ -f "manifest.json" ]; then
          echo "✓ manifest.json found"
        else
          echo "✗ manifest.json missing"
          exit 1
        fi
    
    - name: Create Extension ZIP
      run: |
        zip -r python-tutor-extension.zip . -x "*.git*" "*.github*" "README.md"
        echo "✓ Extension packaged successfully"
    
    - name: Upload ZIP as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-tutor-extension
        path: python-tutor-extension.zip
        retention-days: 90
    
    - name: Get version from manifest
      id: version
      run: |
        VERSION=$(grep -o '"version": "[^"]*' manifest.json | grep -o '[^"]*$')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extension version: $VERSION"
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        body: |
          ## Python Tutor Extension v${{ steps.version.outputs.version }}
          
          ### What's New:
          - Auto-built from latest code
          - Download the ZIP file below to install
          
          ### Installation:
          1. Download `python-tutor-extension.zip`
          2. Extract the folder
          3. Go to `chrome://extensions/`
          4. Enable Developer mode
          5. Click "Load unpacked"
          6. Select the extracted folder
          
        files: |
          python-tutor-extension.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
